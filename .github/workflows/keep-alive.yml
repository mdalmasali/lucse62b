name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET \
            'https://ftvtlqxpalwvyserujuh.supabase.co/rest/v1/users?select=id&limit=1' \
            -H 'apikey: ${{ secrets.SUPABASE_ANON_KEY }}' \
            -H 'Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}'
          echo "✅ Supabase Keep-Alive done!"
