<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile | CSE 62B LU</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .profile-container {
      max-width: 800px;
      margin: 100px auto 40px auto;
      padding: 0 20px;
    }
    
    .profile-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 50px rgba(0,0,0,0.5);
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    
    .profile-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(236, 72, 153, 0.2));
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      margin: 40px auto 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #fff;
      border: 4px solid var(--background);
      position: relative;
      z-index: 2;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .user-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .user-id {
      color: var(--accent-bright);
      font-family: monospace;
      font-size: 1.1rem;
      background: rgba(124, 58, 237, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 16px;
    }

    .user-info-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .info-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      background: rgba(255,255,255,0.03);
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .btn-logout {
      background: rgba(244, 63, 94, 0.1);
      color: #f43f5e;
      border: 1px solid rgba(244, 63, 94, 0.3);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-logout:hover {
      background: #f43f5e;
      color: #fff;
    }

    /* Result Section */
    .result-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 30px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 50px rgba(0,0,0,0.5);
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .iframe-container {
      width: 100%;
      height: 500px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      background: #fff; /* Universities usually have white backgrounds */
    }

    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .iframe-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .fallback-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      margin-top: 20px;
      transition: all 0.3s;
    }
    .fallback-btn:hover {
      background: var(--accent-bright);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="bg-canvas">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <div class="wrapper">
    <nav class="topbar fade-in">
      <a href="../index.html" class="topbar-brand">CSE 62B · PORTAL</a>
      <ul class="topbar-links">
        <li><a href="../index.html">Home</a></li>
      </ul>
    </nav>

    <div class="profile-container fade-in delay-1">
      
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="avatar"><i class="fa-solid fa-user-astronaut"></i></div>
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-id" id="userId">ID: ---------</div>
        
        <div class="user-info-row">
          <div class="info-badge">
            <i class="fa-solid fa-phone" style="color: var(--green);"></i>
            <span id="userPhone">-------</span>
          </div>
          <div class="info-badge">
            <i class="fa-solid fa-graduation-cap" style="color: var(--accent-bright);"></i>
            Section 62B
          </div>
        </div>

        <button class="btn-logout" onclick="logout()">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>

      <!-- Result Integration -->
      <div class="result-section fade-in delay-2">
        <h2 class="section-title">
          <i class="fa-solid fa-square-poll-vertical" style="color: #38bdf8;"></i> Semester Results
        </h2>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">
          View your latest academic results directly from the university portal.
        </p>
        
        <div class="iframe-container">
          <div class="iframe-loading" id="iframeLoader">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--accent);"></i>
            <span>Loading University Portal...</span>
          </div>
          <!-- Note: LU Result site is embedded. If they block iframes, the fallback button below handles it. -->
          <iframe src="https://lus.ac.bd/result/" onload="document.getElementById('iframeLoader').style.display='none'"></iframe>
        </div>

        <div style="text-align: center; margin-top: 15px;">
          <p style="font-size: 0.85rem; color: var(--text-secondary);">If the result page doesn't load above (due to browser security), click the button below:</p>
          <a href="https://lus.ac.bd/result/" target="_blank" class="fallback-btn">
            <i class="fa-solid fa-external-link-alt"></i> Open Result Site
          </a>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Check if user is logged in
    const userData = localStorage.getItem('lu62b_student') || sessionStorage.getItem('lu62b_student');
    if (!userData) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(userData);
      
      // Populate Data
      document.getElementById('userName').innerText = user.name || 'Student';
      document.getElementById('userId').innerText = 'ID: ' + user.id;
      
      // Format phone number safely
      let phone = user.phone || 'N/A';
      if (phone !== 'N/A' && phone.length >= 11) {
        phone = phone.substring(0, 5) + '...' + phone.substring(phone.length - 3);
      }
      document.getElementById('userPhone').innerText = phone;
    }

    function logout() {
      localStorage.removeItem('lu62b_student');
      sessionStorage.removeItem('lu62b_student');
      window.location.href = '../index.html';
    }
  </script>
</body>
</html>
