      var raw = localStorage.getItem('lu62b_student') || sessionStorage.getItem('lu62b_student');
      if (!raw) { window.location.replace('login.html'); return; }
      try {
        var s = JSON.parse(raw);
        if (!s || s.id !== '0182320012101068') { window.location.replace('login.html'); }
      } catch(e) { window.location.replace('login.html'); }
    })();

  <style>
    .att-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin: 32px 0 20px;
    }
    .att-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--text);
    }
    .att-date {
      font-size: 0.82rem; color: var(--text-secondary);
      margin-top: 2px;
    }
    .att-stats {
      display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap;
    }
    .att-stat-pill {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 100px; padding: 6px 14px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--green);
    }
    .att-stat-pill.total {
      background: rgba(124,58,237,0.1);
      border-color: rgba(124,58,237,0.25);
      color: var(--accent-bright);
    }
    .att-stat-pill.absent {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.22);
      color: #f87171;
    }
    .att-course {
      width: 200px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    .att-course:focus { outline: none; border-color: var(--accent); }
    .att-course::placeholder { color: var(--muted); }
    html[data-theme="light"] .att-course { background: rgba(0,0,0,0.04); color: #1a1a2e; }
    html[data-theme="light"] .att-course::placeholder { color: #94a3b8; }
    .att-course-wrap { position: relative; flex-shrink: 0; }
    .att-course-dropdown {
      position: absolute;
      top: calc(100% + 5px); left: 0; right: 0; min-width: 230px;
      background: var(--card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      overflow: hidden;
      z-index: 200;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .att-course-option {
      padding: 10px 14px;
      font-size: 0.84rem;
      cursor: pointer;
      color: var(--text);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      transition: background 0.12s;
    }
    .att-course-option:hover { background: rgba(124,58,237,0.12); }
    .att-course-del {
      font-size: 0.7rem; color: var(--muted);
      padding: 2px 5px; border-radius: 5px;
      opacity: 0; transition: opacity 0.12s;
      cursor: pointer; flex-shrink: 0;
    }
    .att-course-option:hover .att-course-del { opacity: 1; }
    .att-course-del:hover { color: #f87171; }
    .att-course-code {
      font-size: 0.7rem; font-weight: 700;
      color: var(--accent-bright);
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 5px; padding: 1px 7px;
      flex-shrink: 0; white-space: nowrap;
    }

    /* Toolbar */
    .att-toolbar {
      display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .att-search {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .att-search:focus { outline: none; border-color: var(--accent); }
    .att-search::placeholder { color: var(--muted); }

    .att-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 16px; border-radius: 11px; border: none;
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .att-btn-clear {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }
    .att-btn-clear:hover { background: rgba(239,68,68,0.22); }
    .att-btn-copy {
      background: rgba(6,182,212,0.12);
      border: 1px solid rgba(6,182,212,0.25);
      color: var(--accent2);
    }
    .att-btn-copy:hover { background: rgba(6,182,212,0.22); }
    .att-btn-pdf {
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.25);
      color: var(--accent-bright);
    }
    .att-btn-pdf:hover { background: rgba(124,58,237,0.22); }
    .att-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Student Grid */
    .att-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }
    .att-student {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .att-student:hover { border-color: var(--border-light); background: var(--card-hover); }
    .att-student.present {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.35);
    }
    .att-student.pending-mark { opacity: 0.6; pointer-events: none; }

    .att-check {
      width: 26px; height: 26px; border-radius: 8px;
      border: 2px solid var(--border-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 0.85rem;
      transition: all 0.18s;
    }
    .att-student.present .att-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .att-student-info { flex: 1; min-width: 0; }
    .att-student-name {
      font-size: 0.9rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .att-student-id {
      font-size: 0.75rem; color: var(--text-secondary);
      font-family: monospace; margin-top: 2px;
    }
    .att-student.present .att-student-name { color: var(--green); }

    /* Empty / loading */
    .att-empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-secondary); font-size: 0.9rem;
    }
    .att-loading-spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: att-spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes att-spin { to { transform: rotate(360deg); } }

    /* Toast */
    .att-toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(15,15,25,0.95); backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: 12px; padding: 10px 20px;
      font-size: 0.85rem; color: var(--text);
      z-index: 9999; white-space: nowrap;
      animation: att-toast-in 0.25s ease;
      pointer-events: none;
    }
    @keyframes att-toast-in { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    html[data-theme="light"] .att-search {
      background: rgba(0,0,0,0.04); color: #1a1a2e;
    }
    html[data-theme="light"] .att-search::placeholder { color: #94a3b8; }

    @media (max-width: 600px) {
      .att-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .att-toolbar { gap: 8px; }
      .att-header { margin-top: 20px; }
    }
    @media (max-width: 380px) {
      .att-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script>
    const WORKER = 'https://lucse62b-api.sy164425.workers.dev';
    const ADMIN_ID = '0182320012101068';

    var allStudents   = [];  // { sl, id, name }
    var presentSet    = new Set();
    var pendingIds    = new Set();
    var searchQuery   = '';

    // ── Date display ────────────────────────────────────────────────────
    (function() {
      var d = new Date();
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      document.getElementById('attDate').textContent =
        days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    })();

    // ── Load student list from Sheet ─────────────────────────────────────
    async function loadStudents() {
      try {
        var r = await fetch(WORKER + '/sheet?name=Student%20Info');
        var data = await r.json();
        var rows = (data.table && data.table.rows) ? data.table.rows : [];
        allStudents = [];
        rows.forEach(function(row) {
          var cells = (row.c || []).map(function(c) {
            return (c && c.v != null) ? String(c.f || c.v).trim() : '';
          });
          if (cells[0] && /^\d+$/.test(cells[0]) && cells[1] && cells[2]) {
            allStudents.push({ sl: cells[0], id: cells[1], name: cells[2] });
          }
        });
        document.getElementById('statTotal').textContent = 'Total: ' + allStudents.length;
      } catch(e) {
        console.error('Student load failed', e);
      }
    }

    // ── Load today's attendance from Supabase ────────────────────────────
    async function loadAttendance() {
      try {
        var r = await fetch(WORKER + '/attendance');
        var data = await r.json();
        presentSet = new Set((data.records || []).map(function(rec) { return rec.student_id; }));
        updateStats();
      } catch(e) {
        console.error('Attendance load failed', e);
      }
    }

    // ── Render grid ──────────────────────────────────────────────────────
    function renderGrid() {
      var grid = document.getElementById('attGrid');
      var q = searchQuery.toLowerCase();
      var filtered = allStudents.filter(function(s) {
        return !q || s.name.toLowerCase().includes(q) || s.id.includes(q);
      });

      if (!filtered.length) {
        grid.innerHTML = '<div class="att-empty" style="grid-column:1/-1;">No students found.</div>';
        return;
      }

      grid.innerHTML = '';
      filtered.forEach(function(s) {
        var isPresent = presentSet.has(s.id);
        var isPending = pendingIds.has(s.id);
        var card = document.createElement('div');
        card.className = 'att-student' + (isPresent ? ' present' : '') + (isPending ? ' pending-mark' : '');
        card.dataset.id = s.id;
        card.innerHTML =
          '<div class="att-check">' + (isPresent ? '<i class="fa-solid fa-check"></i>' : '') + '</div>' +
          '<div class="att-student-info">' +
            '<div class="att-student-name">' + escHtml(s.name) + '</div>' +
            '<div class="att-student-id">' + escHtml(s.id) + '</div>' +
          '</div>';
        card.addEventListener('click', function() { toggleStudent(s); });
        grid.appendChild(card);
      });
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function updateStats() {
      var absent = allStudents.length - presentSet.size;
      document.getElementById('statPresent').textContent = 'Present: ' + presentSet.size;
      if (allStudents.length > 0) {
        document.getElementById('statAbsent').textContent = 'Absent: ' + absent;
      }
    }

    // Extract Bangladeshi "dak naam" — strip honorific prefixes, return first remaining word
    function getNickname(fullName) {
      var prefixes = /^(md\.?|mohammad|mohammed|muhammad|muhammed|abdul|abu|al|sk\.?|sheikh|khandoker|kha\.?)\s+/i;
      var s = fullName.trim();
      var prev;
      do { prev = s; s = s.replace(prefixes, ''); } while (s !== prev);
      return s.split(/\s+/)[0];
    }

    // ── Toggle mark/unmark ───────────────────────────────────────────────
    async function toggleStudent(s) {
      if (pendingIds.has(s.id)) return;
      pendingIds.add(s.id);
      renderGrid();

      var action = presentSet.has(s.id) ? 'unmark' : 'mark';
      try {
        var r = await fetch(WORKER + '/attendance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: action, admin_id: ADMIN_ID, student_id: s.id, student_name: s.name }),
        });
        if (r.ok) {
          if (action === 'mark') presentSet.add(s.id);
          else presentSet.delete(s.id);
          updateStats();
        } else {
          showToast('Error saving — try again');
        }
      } catch(e) {
        showToast('Network error');
      }
      pendingIds.delete(s.id);
      renderGrid();
    }

    // ── Clear all ────────────────────────────────────────────────────────
    async function clearAttendance() {
      if (!confirm('Clear all attendance for today?')) return;
      try {
        var r = await fetch(WORKER + '/attendance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'clear', admin_id: ADMIN_ID }),
        });
        if (r.ok) {
          presentSet.clear();
          updateStats();
          renderGrid();
          showToast('Attendance cleared');
        }
      } catch(e) {
        showToast('Network error');
      }
    }

    // ── Copy report ──────────────────────────────────────────────────────
    function buildReportText() {
      var d = new Date();
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var dateStr = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
      var timeStr = d.toLocaleTimeString('en-BD', { hour: '2-digit', minute: '2-digit' });
      var course  = document.getElementById('attCourse').value.trim();

      var presentStudents = allStudents.filter(function(s) { return presentSet.has(s.id); });
      var absentStudents  = allStudents.filter(function(s) { return !presentSet.has(s.id); });

      var lines = [];
      lines.push('🏛️ Leading University');
      lines.push('📋 CSE 62B Attendance — ' + dateStr + ', ' + timeStr);
      if (course) lines.push('📚 Course: ' + course);
      lines.push('━━━━━━━━━━━━━━━━━━━━');
      lines.push('✅ Present (' + presentStudents.length + '):');
      presentStudents.forEach(function(s, i) {
        lines.push((i + 1) + '. ' + getNickname(s.name) + ' — ' + s.id);
      });
      lines.push('━━━━━━━━━━━━━━━━━━━━');
      lines.push('Total: ' + allStudents.length + '  |  Present: ' + presentStudents.length + '  |  Absent: ' + absentStudents.length);
      return lines.join('\n');
    }

    function copyReport() {
      var text = buildReportText();
      navigator.clipboard.writeText(text).then(function() {
        showToast('Report copied to clipboard!');
      }).catch(function() {
        // fallback
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Report copied!');
      });
    }

    // ── PDF download ─────────────────────────────────────────────────────
    function downloadPdf() {
      if (!window.jspdf) { showToast('PDF library loading…'); return; }
      saveCourse(document.getElementById('attCourse').value.trim());
      var { jsPDF } = window.jspdf;
      var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      var d = new Date();
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var dateStr = days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
      var timeStr = d.toLocaleTimeString('en-BD', { hour: '2-digit', minute: '2-digit' });
      var course  = document.getElementById('attCourse').value.trim();

      var presentStudents = allStudents.filter(function(s) { return presentSet.has(s.id); });
      var absentStudents  = allStudents.filter(function(s) { return !presentSet.has(s.id); });
      var pageW = 210, mg = 14, cW = pageW - mg * 2;
      var y = 0;

      // ══════════════════════════════════════════════════════════
      // HEADER BAND
      // ══════════════════════════════════════════════════════════
      var hH = 48;
      // Deep purple base
      doc.setFillColor(55, 15, 175);
      doc.rect(0, 0, pageW, hH, 'F');
      // Right accent panel
      doc.setFillColor(80, 30, 200);
      doc.rect(pageW - 56, 0, 56, hH, 'F');
      // Top highlight stripe
      doc.setFillColor(167, 139, 250);
      doc.rect(0, 0, pageW, 1.5, 'F');
      // Left accent bar
      doc.setFillColor(196, 181, 253);
      doc.rect(0, 0, 3.5, hH, 'F');
      // Bottom border
      doc.setFillColor(109, 40, 217);
      doc.rect(0, hH - 1.5, pageW, 1.5, 'F');

      // LU badge (circle)
      doc.setFillColor(255, 255, 255);
      doc.circle(pageW - 29, hH / 2 + 1, 14, 'F');
      doc.setFillColor(80, 30, 200);
      doc.circle(pageW - 29, hH / 2 + 1, 11, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.text('LU', pageW - 29, hH / 2 + 5, { align: 'center' });

      // University name
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(17);
      doc.text('Leading University', mg + 5, 17);
      // Dept subtitle
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(200, 185, 255);
      doc.text('Dept. of Computer Science & Engineering', mg + 5, 25);
      // "ATTENDANCE REPORT" pill
      doc.setFillColor(130, 80, 255);
      doc.roundedRect(mg + 5, 29, 48, 7.5, 2, 2, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7.5);
      doc.text('ATTENDANCE REPORT', mg + 5 + 24, 34.5, { align: 'center' });

      y = hH;

      // ── Info bar (date / time / course) ────────────────────────────────
      doc.setFillColor(248, 245, 255);
      doc.rect(0, y, pageW, 12, 'F');
      doc.setDrawColor(210, 200, 240);
      doc.setLineWidth(0.25);
      doc.line(0, y + 12, pageW, y + 12);

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7.5);
      doc.setTextColor(65, 35, 155);
      doc.text(dateStr, mg + 5, y + 8);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(130, 100, 200);
      var dW = doc.getTextWidth(dateStr);
      doc.text('  |  ' + timeStr, mg + 5 + dW, y + 8);

      if (course) {
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(65, 35, 155);
        var cLabel = 'Course: ';
        var cLabelW = doc.getTextWidth(cLabel);
        var cValW   = doc.getTextWidth(course);
        var cX = pageW - mg - 5 - cLabelW - cValW;
        doc.text(cLabel, cX, y + 8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(100, 70, 185);
        doc.text(course, cX + cLabelW, y + 8);
      }
      y += 12;

      // ── Stat cards ──────────────────────────────────────────────────────
      y += 6;
      var cardH = 17, cardR = 2.5;
      var cardW = (cW - 8) / 3;
      var cards = [
        { lbl: 'TOTAL STUDENTS', val: allStudents.length,     bg:[235,228,255], bar:[109,40,217],  tc:[60,20,140],  vc:[85,45,190] },
        { lbl: 'PRESENT',        val: presentStudents.length, bg:[209,250,229], bar:[16,185,129],  tc:[5,80,45],    vc:[10,140,75] },
        { lbl: 'ABSENT',         val: absentStudents.length,  bg:[254,226,226], bar:[220,60,60],   tc:[120,20,20],  vc:[185,40,40] },
      ];
      cards.forEach(function(c, i) {
        var cx = mg + i * (cardW + 4);
        doc.setFillColor(c.bg[0], c.bg[1], c.bg[2]);
        doc.roundedRect(cx, y, cardW, cardH, cardR, cardR, 'F');
        // Left accent strip
        doc.setFillColor(c.bar[0], c.bar[1], c.bar[2]);
        doc.roundedRect(cx, y, 4, cardH, cardR, cardR, 'F');
        doc.rect(cx + 2, y, 2, cardH, 'F');
        // Value
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(15);
        doc.setTextColor(c.vc[0], c.vc[1], c.vc[2]);
        doc.text(String(c.val), cx + cardW - 4, y + 11, { align: 'right' });
        // Label
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(5.8);
        doc.setTextColor(c.tc[0], c.tc[1], c.tc[2]);
        doc.text(c.lbl, cx + 7, y + 5.5);
      });
      y += cardH + 7;

      // ══════════════════════════════════════════════════════════
      // TABLE
      // ══════════════════════════════════════════════════════════
      var col = { n: mg + 3, name: mg + 11, id: mg + 120, status: mg + cW - 2 };
      var rowH = 7.2;

      function drawTblHeader(yy) {
        doc.setFillColor(55, 15, 175);
        doc.roundedRect(mg, yy, cW, 8.5, 2, 2, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7.5);
        doc.text('#',            col.n,      yy + 5.6);
        doc.text('Student Name', col.name,   yy + 5.6);
        doc.text('Student ID',   col.id,     yy + 5.6);
        doc.text('Status',       col.status, yy + 5.6, { align: 'right' });
        return yy + 8.5;
      }

      y = drawTblHeader(y);

      allStudents.forEach(function(s, i) {
        if (y + rowH > 282) {
          doc.addPage();
          y = drawTblHeader(15);
        }
        var isPresent = presentSet.has(s.id);

        // Row bg
        if (isPresent) {
          doc.setFillColor(236, 253, 245);
        } else {
          doc.setFillColor(i % 2 === 0 ? 251 : 255, i % 2 === 0 ? 251 : 255, 255);
        }
        doc.rect(mg, y, cW, rowH, 'F');

        // Green left bar for present
        if (isPresent) {
          doc.setFillColor(16, 185, 129);
          doc.rect(mg, y, 2.5, rowH, 'F');
        }

        // Row separator
        doc.setDrawColor(225, 218, 248);
        doc.setLineWidth(0.15);
        doc.line(mg, y + rowH, mg + cW, y + rowH);

        // #
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(6.8);
        doc.setTextColor(155, 145, 175);
        doc.text(String(i + 1), col.n, y + 4.8);

        // Name
        doc.setFontSize(7.5);
        doc.setTextColor(isPresent ? 8 : 42, isPresent ? 95 : 38, isPresent ? 58 : 52);
        doc.setFont('helvetica', isPresent ? 'bold' : 'normal');
        var nameTxt = doc.splitTextToSize(s.name, col.id - col.name - 5)[0];
        doc.text(nameTxt, col.name, y + 4.8);

        // ID
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.setTextColor(105, 82, 168);
        doc.text(s.id, col.id, y + 4.8);

        // Status badge
        if (isPresent) {
          doc.setFillColor(16, 185, 129);
          doc.roundedRect(col.status - 18, y + 1.5, 16, 4.5, 1.2, 1.2, 'F');
          doc.setTextColor(255, 255, 255);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(6.5);
          doc.text('Present', col.status - 10, y + 5, { align: 'center' });
        } else {
          doc.setFillColor(254, 226, 226);
          doc.roundedRect(col.status - 15, y + 1.5, 13, 4.5, 1.2, 1.2, 'F');
          doc.setTextColor(185, 45, 45);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(6.5);
          doc.text('Absent', col.status - 8.5, y + 5, { align: 'center' });
        }
        y += rowH;
      });

      // ── Summary row ─────────────────────────────────────────────────────
      y += 1;
      doc.setFillColor(55, 15, 175);
      doc.roundedRect(mg, y, cW, 9, 2, 2, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.text(
        'Total: ' + allStudents.length + '          Present: ' + presentStudents.length + '          Absent: ' + absentStudents.length,
        mg + cW / 2, y + 6, { align: 'center' }
      );
      y += 15;

      // ── Footer ──────────────────────────────────────────────────────────
      doc.setFillColor(248, 245, 255);
      doc.rect(0, y, pageW, 11, 'F');
      doc.setFillColor(167, 139, 250);
      doc.rect(0, y, pageW, 1.2, 'F');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(120, 95, 185);
      doc.text('CSE 62B Portal  ·  Leading University  ·  lucse62b.xyz', mg, y + 7.5);
      doc.text('Generated: ' + new Date().toISOString().slice(0, 16).replace('T', ' '), pageW - mg, y + 7.5, { align: 'right' });

      doc.save('CSE62B-Attendance-' + new Date().toISOString().slice(0, 10) + '.pdf');
      showToast('PDF downloaded!');
    }

    // ── Toast ────────────────────────────────────────────────────────────
    var _toastTimer = null;
    function showToast(msg) {
      var existing = document.querySelector('.att-toast');
      if (existing) existing.remove();
      if (_toastTimer) clearTimeout(_toastTimer);
      var t = document.createElement('div');
      t.className = 'att-toast';
      t.textContent = msg;
      document.body.appendChild(t);
      _toastTimer = setTimeout(function() { if (t.parentNode) t.remove(); }, 2500);
    }

    // ── Search ───────────────────────────────────────────────────────────
    document.getElementById('attSearch').addEventListener('input', function() {
      searchQuery = this.value.trim();
      renderGrid();
    });

    // ── Course suggestions (fetched from CPG_Courses sheet) ──────────────
    var COURSES = [];

    function saveCourse(name) { /* kept for manual/custom entries */ }

    async function loadCourses() {
      try {
        var data = await fetchSheet('CPG_Courses');
        var cols = {};
        ((data.table && data.table.cols) || []).forEach(function(c, i) {
          var label = (c && c.label) ? String(c.label).trim().toLowerCase() : '';
          if (label) cols[label] = i;
        });
        var tCol = cols['title'] !== undefined ? cols['title']
                 : cols['course title'] !== undefined ? cols['course title']
                 : cols['course'] !== undefined ? cols['course'] : 0;
        var cCol = cols['code'] !== undefined ? cols['code']
                 : cols['course code'] !== undefined ? cols['course code'] : 1;
        var rows = (data.table && data.table.rows) || [];
        COURSES = rows.map(function(r) {
          var c = (r.c || []).map(function(x) { return (x && x.v != null) ? String(x.v).trim() : ''; });
          return { title: c[tCol] || '', code: c[cCol] || '' };
        }).filter(function(c) { return c.title; });
      } catch(e) { /* fail silently — user can still type manually */ }
    }

    function showCourseSuggestions(q) {
      var dropdown = document.getElementById('courseDropdown');
      var qLow = q.toLowerCase();
      var matches = COURSES.filter(function(c) {
        return !q || c.title.toLowerCase().includes(qLow) || c.code.toLowerCase().includes(qLow);
      });
      if (!matches.length) { dropdown.style.display = 'none'; return; }
      dropdown.innerHTML = matches.map(function(c) {
        var val = c.code ? c.title + ' (' + c.code + ')' : c.title;
        return '<div class="att-course-option" data-val="' + escHtml(val) + '">' +
          '<span>' + escHtml(c.title) + '</span>' +
          (c.code ? '<span class="att-course-code">' + escHtml(c.code) + '</span>' : '') +
        '</div>';
      }).join('');
      dropdown.style.display = 'block';
      dropdown.querySelectorAll('.att-course-option').forEach(function(el) {
        el.addEventListener('mousedown', function(e) {
          e.preventDefault();
          document.getElementById('attCourse').value = el.dataset.val;
          dropdown.style.display = 'none';
        });
      });
    }

    (function() {
      var inp = document.getElementById('attCourse');
      inp.addEventListener('focus', function() { showCourseSuggestions(this.value.trim()); });
      inp.addEventListener('input', function() { showCourseSuggestions(this.value.trim()); });
      inp.addEventListener('blur',  function() {
        setTimeout(function() { document.getElementById('courseDropdown').style.display = 'none'; }, 150);
      });
    })();

    // ── Init ─────────────────────────────────────────────────────────────
    async function init() {
      await Promise.all([loadStudents(), loadAttendance(), loadCourses()]);
      renderGrid();
    }

    init();

    // Auto-refresh attendance every 30s (in case used on multiple devices)
    setInterval(async function() {
      await loadAttendance();
      renderGrid();
    }, 30000);
  </script>
</body>
