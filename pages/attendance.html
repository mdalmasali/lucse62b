      try {
        var s = JSON.parse(raw);
        if (!s || s.id !== '0182320012101068') { window.location.replace('login.html'); }
      } catch(e) { window.location.replace('login.html'); }
    })();

  <style>
    .att-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin: 32px 0 20px;
    }
    .att-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--text);
    }
    .att-date {
      font-size: 0.82rem; color: var(--text-secondary);
      margin-top: 2px;
    }
    .att-stats {
      display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap;
    }
    .att-stat-pill {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 100px; padding: 6px 14px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--green);
    }
    .att-stat-pill.total {
      background: rgba(124,58,237,0.1);
      border-color: rgba(124,58,237,0.25);
      color: var(--accent-bright);
    }
    .att-stat-pill.absent {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.22);
      color: #f87171;
    }
    .att-course {
      width: 200px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    .att-course:focus { outline: none; border-color: var(--accent); }
    .att-course::placeholder { color: var(--muted); }
    html[data-theme="light"] .att-course { background: rgba(0,0,0,0.04); color: #1a1a2e; }
    html[data-theme="light"] .att-course::placeholder { color: #94a3b8; }
    .att-course-wrap { position: relative; flex-shrink: 0; }
    .att-course-dropdown {
      position: absolute;
      top: calc(100% + 5px); left: 0; right: 0; min-width: 230px;
      background: #14141e;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      overflow-y: auto;
      max-height: 320px;
      z-index: 500;
      display: none;
      box-shadow: 0 14px 40px rgba(0,0,0,0.6);
    }
    html[data-theme="light"] .att-course-dropdown { background: #ffffff; }
    .att-course-option {
      padding: 10px 14px;
      font-size: 0.84rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      transition: background 0.12s;
    }
    .att-course-option:last-child { border-bottom: none; }
    .att-course-option:hover { background: rgba(124,58,237,0.18); }
    html[data-theme="light"] .att-course-option { border-bottom-color: rgba(0,0,0,0.06); }
    html[data-theme="light"] .att-course-option:hover { background: rgba(124,58,237,0.1); }
    .att-course-del {
      font-size: 0.7rem; color: var(--muted);
      padding: 2px 5px; border-radius: 5px;
      opacity: 0; transition: opacity 0.12s;
      cursor: pointer; flex-shrink: 0;
    }
    .att-course-option:hover .att-course-del { opacity: 1; }
    .att-course-del:hover { color: #f87171; }
    .att-course-code {
      font-size: 0.7rem; font-weight: 700;
      color: var(--accent-bright);
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 5px; padding: 1px 7px;
      flex-shrink: 0; white-space: nowrap;
    }

    /* Toolbar */
    .att-toolbar {
      display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap; margin-bottom: 20px;
      position: relative; z-index: 20;
    }
    .att-search {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .att-search:focus { outline: none; border-color: var(--accent); }
    .att-search::placeholder { color: var(--muted); }

    .att-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 16px; border-radius: 11px; border: none;
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .att-btn-clear {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }
    .att-btn-clear:hover { background: rgba(239,68,68,0.22); }
    .att-btn-copy {
      background: rgba(6,182,212,0.12);
      border: 1px solid rgba(6,182,212,0.25);
      color: var(--accent2);
    }
    .att-btn-copy:hover { background: rgba(6,182,212,0.22); }
    .att-btn-pdf {
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.25);
      color: var(--accent-bright);
    }
    .att-btn-pdf:hover { background: rgba(124,58,237,0.22); }
    .att-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Student Grid */
    .att-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }
    .att-student {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .att-student:hover { border-color: var(--border-light); background: var(--card-hover); }
    .att-student.present {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.35);
    }
    .att-student.pending-mark { opacity: 0.6; pointer-events: none; }

    .att-check {
      width: 26px; height: 26px; border-radius: 8px;
      border: 2px solid var(--border-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 0.85rem;
      transition: all 0.18s;
    }
    .att-student.present .att-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .att-student-info { flex: 1; min-width: 0; }
    .att-student-name {
      font-size: 0.9rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .att-student-id {
      font-size: 0.75rem; color: var(--text-secondary);
      font-family: monospace; margin-top: 2px;
    }
    .att-student.present .att-student-name { color: var(--green); }

    /* Empty / loading */
    .att-empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-secondary); font-size: 0.9rem;
    }
    .att-loading-spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: att-spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes att-spin { to { transform: rotate(360deg); } }

    /* Toast */
    .att-toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(15,15,25,0.95); backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: 12px; padding: 10px 20px;
      font-size: 0.85rem; color: var(--text);
      z-index: 9999; white-space: nowrap;
      animation: att-toast-in 0.25s ease;
      pointer-events: none;
    }
    @keyframes att-toast-in { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    html[data-theme="light"] .att-search {
      background: rgba(0,0,0,0.04); color: #1a1a2e;
    }
    html[data-theme="light"] .att-search::placeholder { color: #94a3b8; }

    @media (max-width: 600px) {
      .att-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .att-toolbar { gap: 8px; }
      .att-header { margin-top: 20px; }
    }
    @media (max-width: 380px) {
      .att-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    const WORKER = 'https://lucse62b-api.sy164425.workers.dev';
    const ADMIN_ID = '0182320012101068';

    var allStudents   = [];  // { sl, id, name }
    var presentSet    = new Set();
    var pendingIds    = new Set();
    var searchQuery   = '';
    var LU_LOGO       = null; // base64 data URL of LU logo, pre-fetched for PDF

    // ── Pre-fetch LU logo as base64 (same-origin; works in Firefox/Safari PDF) ──
    (function loadLogo() {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        try {
          var c = document.createElement('canvas');
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img, 0, 0);
          LU_LOGO = c.toDataURL('image/png');
        } catch(e) {}
      };
      img.src = '../assets/images/lu-logo.png';
    })();

    // ── Date display ────────────────────────────────────────────────────
    (function() {
      var d = new Date();
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      document.getElementById('attDate').textContent =
        days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    })();

    // ── Load student list from Sheet ─────────────────────────────────────
    async function loadStudents() {
      try {
        var r = await fetch(WORKER + '/sheet?name=Student%20Info');
        var data = await r.json();
        var rows = (data.table && data.table.rows) ? data.table.rows : [];
        allStudents = [];
        rows.forEach(function(row) {
          var cells = (row.c || []).map(function(c) {
            return (c && c.v != null) ? String(c.f || c.v).trim() : '';
          });
          if (cells[0] && /^\d+$/.test(cells[0]) && cells[1] && cells[2]) {
            allStudents.push({ sl: cells[0], id: cells[1], name: cells[2] });
          }
        });
        document.getElementById('statTotal').textContent = 'Total: ' + allStudents.length;
      } catch(e) {
        console.error('Student load failed', e);
      }
    }

    // ── Load today's attendance from Supabase ────────────────────────────
    async function loadAttendance() {
      try {
        var r = await fetch(WORKER + '/attendance');
        var data = await r.json();
        presentSet = new Set((data.records || []).map(function(rec) { return rec.student_id; }));
        updateStats();
      } catch(e) {
        console.error('Attendance load failed', e);
      }
    }

    // ── Render grid ──────────────────────────────────────────────────────
    function renderGrid() {
      var grid = document.getElementById('attGrid');
      var q = searchQuery.toLowerCase();
      var filtered = allStudents.filter(function(s) {
        return !q || s.name.toLowerCase().includes(q) || s.id.includes(q);
      });

      if (!filtered.length) {
        grid.innerHTML = '<div class="att-empty" style="grid-column:1/-1;">No students found.</div>';
        return;
      }

      grid.innerHTML = '';
      filtered.forEach(function(s) {
        var isPresent = presentSet.has(s.id);
        var isPending = pendingIds.has(s.id);
        var card = document.createElement('div');
        card.className = 'att-student' + (isPresent ? ' present' : '') + (isPending ? ' pending-mark' : '');
        card.dataset.id = s.id;
        card.innerHTML =
          '<div class="att-check">' + (isPresent ? '<i class="fa-solid fa-check"></i>' : '') + '</div>' +
          '<div class="att-student-info">' +
            '<div class="att-student-name">' + escHtml(s.name) + '</div>' +
            '<div class="att-student-id">' + escHtml(s.id) + '</div>' +
          '</div>';
        card.addEventListener('click', function() { toggleStudent(s); });
        grid.appendChild(card);
      });
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function updateStats() {
      var absent = allStudents.length - presentSet.size;
      document.getElementById('statPresent').textContent = 'Present: ' + presentSet.size;
      if (allStudents.length > 0) {
        document.getElementById('statAbsent').textContent = 'Absent: ' + absent;
      }
    }

    // Extract Bangladeshi "dak naam" — strip honorific prefixes, return first remaining word
    function getNickname(fullName) {
      var prefixes = /^(md\.?|mohammad|mohammed|muhammad|muhammed|abdul|abu|al|sk\.?|sheikh|khandoker|kha\.?)\s+/i;
      var s = fullName.trim();
      var prev;
      do { prev = s; s = s.replace(prefixes, ''); } while (s !== prev);
      return s.split(/\s+/)[0];
    }

    // ── Toggle mark/unmark ───────────────────────────────────────────────
    async function toggleStudent(s) {
      if (pendingIds.has(s.id)) return;
      pendingIds.add(s.id);
      renderGrid();

      var action = presentSet.has(s.id) ? 'unmark' : 'mark';
      try {
        var r = await fetch(WORKER + '/attendance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: action, admin_id: ADMIN_ID, student_id: s.id, student_name: s.name }),
        });
        if (r.ok) {
          if (action === 'mark') presentSet.add(s.id);
          else presentSet.delete(s.id);
          updateStats();
        } else {
          showToast('Error saving — try again');
        }
      } catch(e) {
        showToast('Network error');
      }
      pendingIds.delete(s.id);
      renderGrid();
    }

    // ── Clear all ────────────────────────────────────────────────────────
    async function clearAttendance() {
      if (!confirm('Clear all attendance for today?')) return;
      try {
        var r = await fetch(WORKER + '/attendance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'clear', admin_id: ADMIN_ID }),
        });
        if (r.ok) {
          presentSet.clear();
          updateStats();
          renderGrid();
          showToast('Attendance cleared');
        }
      } catch(e) {
        showToast('Network error');
      }
    }

    // ── Copy report ──────────────────────────────────────────────────────
    function buildReportText() {
      var d = new Date();
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var dateStr = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
      var timeStr = d.toLocaleTimeString('en-BD', { hour: '2-digit', minute: '2-digit' });
      var course  = document.getElementById('attCourse').value.trim();

      var presentStudents = allStudents.filter(function(s) { return presentSet.has(s.id); });
      var absentStudents  = allStudents.filter(function(s) { return !presentSet.has(s.id); });

      var lines = [];
      lines.push('🏛️ Leading University');
      lines.push('📋 CSE 62B Attendance — ' + dateStr + ', ' + timeStr);
      if (course) lines.push('📚 Course: ' + course);
      lines.push('━━━━━━━━━━━━━━━━━━━━');
      lines.push('✅ Present (' + presentStudents.length + '):');
      presentStudents.forEach(function(s, i) {
        lines.push((i + 1) + '. ' + getNickname(s.name) + ' — ' + s.id);
      });
      lines.push('━━━━━━━━━━━━━━━━━━━━');
      lines.push('Total: ' + allStudents.length + '  |  Present: ' + presentStudents.length + '  |  Absent: ' + absentStudents.length);
      return lines.join('\n');
    }

    function copyReport() {
      var text = buildReportText();
      navigator.clipboard.writeText(text).then(function() {
        showToast('Report copied to clipboard!');
      }).catch(function() {
        // fallback
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Report copied!');
      });
    }

    // ── PDF download ─────────────────────────────────────────────────────
    function downloadPdf() {
      if (!window.jspdf) { showToast('PDF library loading…'); return; }
      saveCourse(document.getElementById('attCourse').value.trim());
      var { jsPDF } = window.jspdf;
      var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      var d = new Date();
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var dateStr = days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
      var timeStr = d.toLocaleTimeString('en-BD', { hour: '2-digit', minute: '2-digit' });
      var course  = document.getElementById('attCourse').value.trim();

      var presentStudents = allStudents.filter(function(s) { return presentSet.has(s.id); });
      var absentStudents  = allStudents.filter(function(s) { return !presentSet.has(s.id); });
      var pageW = 210, pageH = 297, mg = 16, cW = pageW - mg * 2;
      var y = 0;

      // ── Palette (sober, formal) ─────────────────────────────────────────
      var INK   = [25, 33, 58];     // deep navy ink
      var INK2  = [95, 104, 128];   // muted slate
      var GREEN = [21, 110, 58];    // present
      var RED   = [168, 46, 46];    // absent
      var LINE  = [120, 130, 150];  // table rules (darker)
      var LINEL = [165, 173, 190];  // row rules
      var HEADBG = [240, 242, 247]; // table header fill

      // ══════════════════════════════════════════════════════════
      // LETTERHEAD (centered)
      // ══════════════════════════════════════════════════════════
      var logoSz = 20;
      if (LU_LOGO) {
        try { doc.addImage(LU_LOGO, 'PNG', (pageW - logoSz) / 2, 12, logoSz, logoSz); } catch(e) {}
      }
      doc.setTextColor(INK[0], INK[1], INK[2]);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(21);
      doc.text('LEADING UNIVERSITY', pageW / 2, 41, { align: 'center' });
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(INK2[0], INK2[1], INK2[2]);
      doc.text('Department of Computer Science & Engineering', pageW / 2, 47, { align: 'center' });
      doc.setFontSize(8.5);
      doc.text('Sylhet, Bangladesh', pageW / 2, 52, { align: 'center' });

      // Double rule
      var ruleY = 56;
      doc.setDrawColor(INK[0], INK[1], INK[2]);
      doc.setLineWidth(0.6);
      doc.line(mg, ruleY, pageW - mg, ruleY);
      doc.setLineWidth(0.25);
      doc.line(mg, ruleY + 1.1, pageW - mg, ruleY + 1.1);

      // ── Report title ────────────────────────────────────────────────────
      y = ruleY + 8.5;
      doc.setTextColor(INK[0], INK[1], INK[2]);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(13);
      doc.text('ATTENDANCE REPORT', pageW / 2, y, { align: 'center' });
      // small underline accent under title
      var titleW = doc.getTextWidth('ATTENDANCE REPORT');
      doc.setDrawColor(GREEN[0], GREEN[1], GREEN[2]);
      doc.setLineWidth(0.5);
      doc.line(pageW / 2 - titleW / 2, y + 1.6, pageW / 2 + titleW / 2, y + 1.6);
      y += 9;

      // ── Meta block (label : value rows, left+right) ─────────────────────
      function metaRow(label, value, valColor, leftX, vy) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(INK[0], INK[1], INK[2]);
        doc.text(label, leftX, vy);
        var lw = doc.getTextWidth(label) + 2;
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(valColor[0], valColor[1], valColor[2]);
        doc.text(value, leftX + lw, vy);
      }
      var colLX = mg + 1, colRX = mg + cW / 2 + 4;
      metaRow('Date:',    dateStr,                       INK2, colLX, y);
      metaRow('Time:',    timeStr,                       INK2, colRX, y);
      y += 6;
      metaRow('Batch & Section:', 'Batch 62, Section B', INK2, colLX, y);
      y += 6;
      // Course on its own full-width row, wrapped so long names never overflow
      if (course) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(INK[0], INK[1], INK[2]);
        doc.text('Course:', colLX, y);
        var clw = doc.getTextWidth('Course:') + 2;
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(GREEN[0], GREEN[1], GREEN[2]);
        var courseLines = doc.splitTextToSize(course, cW - clw - 1);
        doc.text(courseLines, colLX + clw, y);
        y += 6 * courseLines.length;
      }
      y += 0.5;

      // ══════════════════════════════════════════════════════════
      // TABLE (ruled grid)
      // ══════════════════════════════════════════════════════════
      // Column widths → boundary x positions
      var wNum = 11, wStatus = 24, wId = 33;
      var b0 = mg;
      var b1 = b0 + wNum;                 // | # |
      var b2 = mg + cW - wStatus - wId;   // name end
      var b3 = b2 + wId;                  // id end
      var b4 = mg + cW;                   // status end
      var rowH = 7.2;

      function drawTblHeader(yy) {
        doc.setFillColor(INK[0], INK[1], INK[2]);
        doc.rect(mg, yy, cW, 8, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8);
        doc.text('#',           (b0 + b1) / 2, yy + 5.4, { align: 'center' });
        doc.text('Student Name', b1 + 3,       yy + 5.4);
        doc.text('Student ID',  (b2 + b3) / 2, yy + 5.4, { align: 'center' });
        doc.text('Status',      (b3 + b4) / 2, yy + 5.4, { align: 'center' });
        return yy + 8;
      }

      y = drawTblHeader(y);
      var tblTop = y;

      function closeTableGrid(top, bottom) {
        doc.setDrawColor(LINE[0], LINE[1], LINE[2]);
        doc.setLineWidth(0.45);
        // outer box
        doc.rect(mg, top, cW, bottom - top);
        // vertical rules
        [b1, b2, b3].forEach(function(bx) { doc.line(bx, top, bx, bottom); });
      }

      allStudents.forEach(function(s, i) {
        if (y + rowH > pageH - 30) {
          closeTableGrid(tblTop, y);
          doc.addPage();
          y = drawTblHeader(16);
          tblTop = y;
        }
        var isPresent = presentSet.has(s.id);

        // subtle zebra
        if (i % 2 === 1) {
          doc.setFillColor(248, 249, 251);
          doc.rect(mg, y, cW, rowH, 'F');
        }
        // row separator
        doc.setDrawColor(LINEL[0], LINEL[1], LINEL[2]);
        doc.setLineWidth(0.25);
        doc.line(mg, y + rowH, mg + cW, y + rowH);

        // #
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7.5);
        doc.setTextColor(INK2[0], INK2[1], INK2[2]);
        doc.text(String(i + 1), (b0 + b1) / 2, y + 4.8, { align: 'center' });

        // Name
        doc.setFontSize(8.5);
        doc.setTextColor(INK[0], INK[1], INK[2]);
        doc.setFont('helvetica', 'normal');
        var nameTxt = doc.splitTextToSize(s.name, b2 - b1 - 6)[0];
        doc.text(nameTxt, b1 + 3, y + 4.8);

        // ID
        doc.setFontSize(7.8);
        doc.setTextColor(INK2[0], INK2[1], INK2[2]);
        doc.text(s.id, (b2 + b3) / 2, y + 4.8, { align: 'center' });

        // Status (text, colored — no heavy badge for formal look)
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8);
        if (isPresent) {
          doc.setTextColor(GREEN[0], GREEN[1], GREEN[2]);
          doc.text('Present', (b3 + b4) / 2, y + 4.8, { align: 'center' });
        } else {
          doc.setTextColor(RED[0], RED[1], RED[2]);
          doc.text('Absent', (b3 + b4) / 2, y + 4.8, { align: 'center' });
        }
        y += rowH;
      });

      closeTableGrid(tblTop, y);

      // ── Summary stat boxes ──────────────────────────────────────────────
      y += 8;
      var sumH = 16, sumGap = 5;
      if (y + sumH > pageH - 20) { doc.addPage(); y = 20; }
      var sumW = (cW - sumGap * 2) / 3;
      var sumCards = [
        { lbl: 'TOTAL STUDENTS', val: allStudents.length,     accent: INK   },
        { lbl: 'PRESENT',        val: presentStudents.length, accent: GREEN },
        { lbl: 'ABSENT',         val: absentStudents.length,  accent: RED   },
      ];
      sumCards.forEach(function(c, i) {
        var sx = mg + i * (sumW + sumGap);
        // bordered box with accent left strip
        doc.setDrawColor(c.accent[0], c.accent[1], c.accent[2]);
        doc.setLineWidth(0.4);
        doc.setFillColor(252, 253, 254);
        doc.roundedRect(sx, y, sumW, sumH, 1.5, 1.5, 'FD');
        doc.setFillColor(c.accent[0], c.accent[1], c.accent[2]);
        doc.rect(sx, y + 1, 1.8, sumH - 2, 'F');
        // big number
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(16);
        doc.setTextColor(c.accent[0], c.accent[1], c.accent[2]);
        doc.text(String(c.val), sx + 8, y + 11);
        // label
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7);
        doc.setTextColor(INK2[0], INK2[1], INK2[2]);
        doc.text(c.lbl, sx + sumW - 3, y + 6.5, { align: 'right' });
      });
      y += sumH;

      // ── Footer (every page) ─────────────────────────────────────────────
      var totalPages = doc.internal.getNumberOfPages();
      for (var p = 1; p <= totalPages; p++) {
        doc.setPage(p);
        doc.setDrawColor(LINE[0], LINE[1], LINE[2]);
        doc.setLineWidth(0.25);
        doc.line(mg, pageH - 13, pageW - mg, pageH - 13);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.setTextColor(INK2[0], INK2[1], INK2[2]);
        doc.text('Generated via CSE 62B Portal  ·  lucse62b.xyz', mg, pageH - 8.5);
        doc.text('Page ' + p + ' of ' + totalPages, pageW - mg, pageH - 8.5, { align: 'right' });
      }

      doc.save('CSE62B-Attendance-' + new Date().toISOString().slice(0, 10) + '.pdf');
      showToast('PDF downloaded!');
    }

    // ── Toast ────────────────────────────────────────────────────────────
    var _toastTimer = null;
    function showToast(msg) {
      var existing = document.querySelector('.att-toast');
      if (existing) existing.remove();
      if (_toastTimer) clearTimeout(_toastTimer);
      var t = document.createElement('div');
      t.className = 'att-toast';
      t.textContent = msg;
      document.body.appendChild(t);
      _toastTimer = setTimeout(function() { if (t.parentNode) t.remove(); }, 2500);
    }

    // ── Search ───────────────────────────────────────────────────────────
    document.getElementById('attSearch').addEventListener('input', function() {
      searchQuery = this.value.trim();
      renderGrid();
    });

    // ── Course suggestions (fetched from CPG_Courses sheet) ──────────────
    var COURSES = [];

    function saveCourse(name) { /* kept for manual/custom entries */ }

    async function loadCourses() {
      try {
        var data = await fetchSheet('CPG_Courses');
        var cols = {};
        ((data.table && data.table.cols) || []).forEach(function(c, i) {
          var label = (c && c.label) ? String(c.label).trim().toLowerCase() : '';
          if (label) cols[label] = i;
        });
        var tCol = cols['title'] !== undefined ? cols['title']
                 : cols['course title'] !== undefined ? cols['course title']
                 : cols['course'] !== undefined ? cols['course'] : 0;
        var cCol = cols['code'] !== undefined ? cols['code']
                 : cols['course code'] !== undefined ? cols['course code'] : 1;
        var rows = (data.table && data.table.rows) || [];
        COURSES = rows.map(function(r) {
          var c = (r.c || []).map(function(x) { return (x && x.v != null) ? String(x.v).trim() : ''; });
          return { title: c[tCol] || '', code: c[cCol] || '' };
        }).filter(function(c) { return c.title; });
      } catch(e) { /* fail silently — user can still type manually */ }
    }

    function showCourseSuggestions(q) {
      var dropdown = document.getElementById('courseDropdown');
      var qLow = q.toLowerCase();
      var matches = COURSES.filter(function(c) {
        return !q || c.title.toLowerCase().includes(qLow) || c.code.toLowerCase().includes(qLow);
      });
      if (!matches.length) { dropdown.style.display = 'none'; return; }
      dropdown.innerHTML = matches.map(function(c) {
        var val = c.code ? c.title + ' (' + c.code + ')' : c.title;
        return '<div class="att-course-option" data-val="' + escHtml(val) + '">' +
          '<span>' + escHtml(c.title) + '</span>' +
          (c.code ? '<span class="att-course-code">' + escHtml(c.code) + '</span>' : '') +
        '</div>';
      }).join('');
      var isLight = document.documentElement.getAttribute('data-theme') === 'light';
      dropdown.style.background = isLight ? '#ffffff' : '#14141e';
      dropdown.style.display = 'block';
      dropdown.querySelectorAll('.att-course-option').forEach(function(el) {
        el.addEventListener('mousedown', function(e) {
          e.preventDefault();
          document.getElementById('attCourse').value = el.dataset.val;
          dropdown.style.display = 'none';
        });
      });
    }

    (function() {
      var inp = document.getElementById('attCourse');
      inp.addEventListener('focus', function() { showCourseSuggestions(this.value.trim()); });
      inp.addEventListener('input', function() { showCourseSuggestions(this.value.trim()); });
      inp.addEventListener('blur',  function() {
        setTimeout(function() { document.getElementById('courseDropdown').style.display = 'none'; }, 150);
      });
    })();

    // ── Init ─────────────────────────────────────────────────────────────
    async function init() {
      await Promise.all([loadStudents(), loadAttendance(), loadCourses()]);
      renderGrid();
    }

    init();

    // Auto-refresh attendance every 30s (in case used on multiple devices)
    setInterval(async function() {
      await loadAttendance();
      renderGrid();
    }, 30000);
  </script>
</body>
</html>
